<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 350px;
            padding: 30px;
            text-align: center;
        }
        .login-container h2 {
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .login-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s;
        }
        .login-btn:hover {
            background-color: #45a049;
        }
        .role-selector {
            margin-bottom: 20px;
        }
        .role-selector button {
            background: none;
            border: none;
            padding: 10px 15px;
            margin: 0 5px;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 3px solid transparent;
        }
        .role-selector button.active {
            border-bottom: 3px solid #4CAF50;
            font-weight: bold;
        }
        .register-link {
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #4CAF50;
            text-decoration: none;
        }
        .error-message {
            color: #f44336;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Attendance System Login</h2>
        
        <div class="role-selector">
            <button class="active" id="employeeBtn">Employee</button>
            <button id="adminBtn">Admin</button>
        </div>
        
        <form action="/login" method="post" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <input type="hidden" id="role" name="role" value="EMPLOYEE">
            <button type="submit" class="login-btn">Login</button>
            
            <div th:if="${param.error}" class="error-message">
                Invalid username or password
            </div>
        </form>
        
        <div class="register-link">
            Don't have an account? <a href="/register">Register as Employee</a>
        </div>
    </div>

    <script>
        document.getElementById('employeeBtn').addEventListener('click', function() {
            document.getElementById('role').value = 'EMPLOYEE';
            this.classList.add('active');
            document.getElementById('adminBtn').classList.remove('active');
        });
        
        document.getElementById('adminBtn').addEventListener('click', function() {
            document.getElementById('role').value = 'ADMIN';
            this.classList.add('active');
            document.getElementById('employeeBtn').classList.remove('active');
        });
    </script>
</body>
</html>
